<!DOCTYPE html>
<html>

<head>

<title>User Profile</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/sidebar.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

body{
    font-family:Poppins,sans-serif;
    background:#f5f7fb;
}

.profile-card{

    max-width:700px;
    margin:40px auto;

    background:white;

    padding:30px;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.profile-pic{

    width:120px;
    height:120px;

    border-radius:50%;

    object-fit:cover;
}

.skill{
    display:inline-block;
    padding:8px 14px;
    background:#eef2ff;
    margin:5px;
    border-radius:20px;
}

</style>

</head>

<body>

{% include 'components/dashboard_sidebar.html' %}

<div class="profile-card">

    {% if user['profile_pic'] %}

    <img
    src="{{ user['profile_pic'] }}"
    class="profile-pic">

    {% endif %}

    <h1>{{ user['name'] }}</h1>

    <p>{{ user['bio'] }}</p>

    <h3>Skills I Teach</h3>

    <p>{{ user['teach_skills'] }}</p>

    <h3>Skills I Want To Learn</h3>

    <p>{{ user['learn_skills'] }}</p>

    <h3>Languages</h3>

    <p>{{ user['languages'] }}</p>

</div>

</body>

</html>
